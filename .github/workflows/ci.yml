name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    name: Lint, type-check, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/sre-agent
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/sre-agent/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check app

      - name: Mypy type-check
        run: mypy app --ignore-missing-imports
        continue-on-error: true   # tighten once @developer annotates everything

      - name: Mypy strict — FASE 5 files (evals + stub_adapter)
        working-directory: .
        run: |
          pip install -r services/sre-agent/requirements.txt
          mypy evals/ services/sre-agent/app/adapters/llm/stub_adapter.py \
            --ignore-missing-imports \
            --strict \
            --exclude '__pycache__'
        env:
          PYTHONPATH: services/sre-agent

      - name: Pytest
        env:
          LLM_PROVIDER: gemini
          LLM_FALLBACK_PROVIDER: none
          GEMINI_API_KEY: dummy-for-tests
          STORAGE_PROVIDER: memory
          CONTEXT_PROVIDER: static
          TICKET_PROVIDER: mock
          NOTIFY_PROVIDER: mock
          LANGFUSE_ENABLED: "false"
        run: pytest -q

  evals:
    name: LLM-as-judge eval gate (ARC-016)
    runs-on: ubuntu-latest
    needs: quality
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/sre-agent/requirements.txt

      - name: Install sre-agent dependencies
        run: pip install -r services/sre-agent/requirements.txt

      - name: Run eval runner (CI mode — 5 golden + all adversarial)
        env:
          # Use stub provider: deterministic scoring, no API key required.
          LLM_PROVIDER: stub
          LLM_FALLBACK_PROVIDER: none
          GEMINI_API_KEY: ""
          STORAGE_PROVIDER: memory
          CONTEXT_PROVIDER: static
          TICKET_PROVIDER: mock
          NOTIFY_PROVIDER: mock
          LANGFUSE_ENABLED: "false"
          CI: "true"
          PYTHONPATH: services/sre-agent
        run: python -m evals.runner --ci

      - name: Upload eval report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-report
          path: evals/reports/latest.json

  build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [quality, evals]  # evals must pass before build — ARC-016
    steps:
      - uses: actions/checkout@v4
      - name: Build sre-agent image
        run: docker build -t sre-agent:ci services/sre-agent
      - name: Build mock-services image
        run: docker build -t mock-services:ci services/mock-services
